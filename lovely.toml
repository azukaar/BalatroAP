[manifest]
version = "1.0.0"
dump_lua = true
priority = 0


# disable SMODS save conversion for AP files
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''function convert_save_data()'''
position = "after"
payload = '''if isAPProfileLoaded and isAPProfileLoaded() then return nil end'''
match_indent=true

# save run serverside
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''if G.FILE_HANDLER.run then'''
position = "after"
payload = '''if isAPProfileLoaded() then 
	G.AP.server_save_run(G.ARGS.save_run) 
	G.SAVED_GAME = G.ARGS.save_run
end'''
match_indent=true

# fix the game breaking our use of bypass_lock
[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = '''self.bypass_lock = true'''
position = "before"
payload = 'if not isAPProfileLoaded() then'
match_indent=true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = '''self.bypass_lock = true'''
position = "after"
payload = 'end'
match_indent=true

# Fallback card
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''if _pool_size == 0 then'''
position = "before"
payload = '''if not isAPProfileLoaded() then'''
match_indent=true

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''return _pool, _pool_key..(not _legendary and G.GAME.round_resets.ante or '')'''
position = "before"
payload = '''else
	if _pool_size == 0 then _pool[1] = "j_rand_fallback" end
end'''
match_indent=true

# remove rarities from polling if they're unavailable
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''v.weight = v.weight*v.mod'''
position = "before"
payload = '''if isAPProfileLoaded() then
	local pool_poll, pool_poll_key = get_current_pool(_pool_key, v.key)
	if pool_poll[1] == "j_rand_fallback" then
		v.mod = 0 
	end
end'''
match_indent=true

# division by zero bad
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''-- recalculate rarities to account for v.mod'''
position = "before"
payload = '''if isAPProfileLoaded() and total_weight == 0 then
	available_rarities[1].weight = 1
	available_rarities[1].mod = 1
	total_weight = 1
end'''
match_indent=true

# Skip j_rand_fallback entries in the create_card resample loop when the
# pool still has real items. This is a defensive backstop: if anything
# causes the fallback joker's key to land in a rarity pool as a real
# entry, pseudorandom_element could pick it and the resample loop would
# exit (the loop only skips 'UNAVAILABLE'), producing a phantom shop
# slot that the emplace hook then deletes. When the pool is genuinely
# empty, the 'Fallback card' patch above sets _pool[1] = 'j_rand_fallback'
# and everything else is UNAVAILABLE — in that case _ap_pool_has_real is
# false and we let the loop exit with fallback so the emplace hook can
# clean up the slot as intended.
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''while center == 'UNAVAILABLE' do'''
position = "before"
payload = '''local _ap_pool_has_real = false
if isAPProfileLoaded() and _type == 'Joker' then
	for _ai, _ae in ipairs(_pool) do
		if _ae ~= 'UNAVAILABLE' and _ae ~= 'j_rand_fallback' then
			_ap_pool_has_real = true
			break
		end
	end
end
if _ap_pool_has_real and center == 'j_rand_fallback' then
	center = 'UNAVAILABLE'
end'''
match_indent=true

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''center = pseudorandom_element(_pool, pseudoseed(_pool_key..'_resample'..it))'''
position = "after"
payload = '''if _ap_pool_has_real and center == 'j_rand_fallback' then
	center = 'UNAVAILABLE'
end'''
match_indent=true

# custom shop
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''for _, v in ipairs(rates) do'''
position = "before"
payload = '''if isAPProfileLoaded() then
	local new_total, modified = G.AP.recalc_shop_rates(rates)
	if modified then
		total_rate = new_total
		polled_rate = pseudorandom(pseudoseed('cdt'..G.GAME.round_resets.ante))*total_rate
	end
end'''
match_indent=true